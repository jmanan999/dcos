name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  # ── API: lint + typecheck + test ────────────────────────────────────────────
  api-lint:
    name: API — lint & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy app/

  api-test:
    name: API — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        # Use our custom image that has both PostGIS and pgvector
        image: postgres:16-bookworm
        env:
          POSTGRES_USER: dcos
          POSTGRES_PASSWORD: dcos
          POSTGRES_DB: dcos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dcos -d dcos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pgvector extension
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          PGPASSWORD=dcos psql -h localhost -U dcos -d dcos_test -c \
            "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm; CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://dcos:dcos@localhost:5432/dcos_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: local
        run: pytest --cov=app --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          flags: api
        continue-on-error: true

  # ── Web: lint + typecheck + build ───────────────────────────────────────────
  web-lint:
    name: Web — lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm --filter web lint

      - name: TypeScript
        run: pnpm --filter web typecheck && pnpm --filter @dcos/ui typecheck && pnpm --filter @dcos/types typecheck

  web-build:
    name: Web — build
    runs-on: ubuntu-latest
    needs: web-lint
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter web build

  # ── Docker images ────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — build API image
    runs-on: ubuntu-latest
    needs: [api-lint, api-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          tags: dcos-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
