name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.15.0"

jobs:
  # ── API: lint ──────────────────────────────────────────────────────────────
  api-lint:
    name: API — lint & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app/ tests/ scripts/ migrations/

      - name: Ruff format check
        run: ruff format --check app/ tests/ scripts/ migrations/

  # ── API: tests ─────────────────────────────────────────────────────────────
  api-test:
    name: API — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      # pgvector/pgvector:pg16 has pgvector pre-installed (AMD64 compatible).
      # PostGIS is installed into the running container via docker exec below.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dcos
          POSTGRES_PASSWORD: dcos
          POSTGRES_DB: dcos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dcos -d dcos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install PostGIS into running Postgres container
        run: |
          # Find the pgvector container (it's the only Postgres running)
          PG_CONTAINER=$(docker ps --filter "ancestor=pgvector/pgvector:pg16" -q)
          echo "Postgres container: $PG_CONTAINER"

          # Install PostGIS packages inside the container
          docker exec $PG_CONTAINER bash -c "
            apt-get update -qq &&
            apt-get install -y --no-install-recommends \
              postgresql-16-postgis-3 \
              postgresql-16-postgis-3-scripts &&
            rm -rf /var/lib/apt/lists/*
          "

          # Now create all needed extensions
          sudo apt-get install -y --no-install-recommends postgresql-client
          PGPASSWORD=dcos psql -h localhost -U dcos -d dcos_test -c "
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            CREATE EXTENSION IF NOT EXISTS btree_gin;
          "
          echo "Extensions installed"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://dcos:dcos@localhost:5432/dcos_test
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://dcos:dcos@localhost:5432/dcos_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: local
        run: pytest --cov=app --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          flags: api
        continue-on-error: true

  # ── Web: lint + typecheck + build ──────────────────────────────────────────
  web-lint:
    name: Web — lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm --filter web lint

      - name: TypeScript
        run: |
          pnpm --filter web typecheck
          pnpm --filter @dcos/ui typecheck
          pnpm --filter @dcos/types typecheck

  web-build:
    name: Web — build
    runs-on: ubuntu-latest
    needs: web-lint
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter web build

  # ── Docker image ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — build API image
    runs-on: ubuntu-latest
    needs: [api-lint, api-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          tags: dcos-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
