version: "3.9"

services:
  # ── Postgres 16 + PostGIS 3.5 + pgvector ───────────────────────────────────
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: dcos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dcos
      POSTGRES_PASSWORD: dcos
      POSTGRES_DB: dcos
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcos -d dcos"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dcos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object store for local dev) ─────────────────────────
  minio:
    image: minio/minio:latest
    container_name: dcos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket bootstrap ───────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: dcos-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/dcos-media;
        mc anonymous set download local/dcos-media/public;
        exit 0
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
